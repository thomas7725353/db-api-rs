services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dbapi_demo
      POSTGRES_USER: dbapi
      POSTGRES_PASSWORD: dbapi_pass
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbapi -d dbapi_demo"]
      interval: 5s
      timeout: 3s
      retries: 20

  db-api-rs:
    image: db-api-rs:local
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RUST_LOG: info
      DB_API_METADATA_URL: sqlite:///data/data.db
    ports:
      - "127.0.0.1:8520:8520"
    volumes:
      - ./data.db:/data/data.db
    depends_on:
      postgres:
        condition: service_healthy

  dbapi-mcp:
    image: db-api-rs:local
    command:
      - /app/db-api-rs
      - mcp
      - --transport
      - http
      - --listen
      - 0.0.0.0:8521
      - --base-url
      - http://db-api-rs:8520
    environment:
      RUST_LOG: info
    ports:
      - "127.0.0.1:8521:8521"
    depends_on:
      db-api-rs:
        condition: service_started

volumes:
  pg-data:
