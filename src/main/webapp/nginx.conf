server {
    listen 8521;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://db-api-rs:8520;
    }

    location /apiConfig/ {
        proxy_pass http://db-api-rs:8520;
    }

    location /datasource/ {
        proxy_pass http://db-api-rs:8520;
    }

    location /health {
        proxy_pass http://db-api-rs:8520;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
